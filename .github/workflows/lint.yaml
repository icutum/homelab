---
name: lint

on:
  pull_request:
    paths:
      - "**/*.yaml"
  push:
    branches:
      - main
    paths:
      - "**/*.yaml"

permissions: {}

jobs:
  test:
    name: Lint YAML
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Lint YAML
        run: yamllint -s .
