---
name: lint

on:
  pull_request:
    paths:
      - "**/*.yaml"
  push:
    branches:
      - main
    paths:
      - "**/*.yaml"

permissions: {}

jobs:
  test:
    name: Lint YAML
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Lint YAML
        run: yamllint -s .
