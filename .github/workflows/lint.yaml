---
name: lint

on:
  pull_request:
    paths:
      - "**/*.yaml"
      - ".yamllint"
  push:
    branches:
      - main
    paths:
      - "**/*.yaml"
      - ".yamllint"

permissions: {}

jobs:
  test:
    name: Lint YAML
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Lint YAML
        run: yamllint -s .
