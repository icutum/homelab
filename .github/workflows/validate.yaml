---
name: validate

on:
  pull_request:
    paths:
      - "**/*.yaml"
  push:
    branches:
      - main
    paths:
      - "**/*.yaml"

permissions: {}

jobs:
  test:
    name: Validate manifests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@978262ecd0f3caca9b5bda5791a8fa83c5b31f61

      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@978262ecd0f3caca9b5bda5791a8fa83c5b31f61

      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@978262ecd0f3caca9b5bda5791a8fa83c5b31f61

      - name: Validate manifests
        run: ./scripts/validate.sh
