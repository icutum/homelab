---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: checkmk-helmrelease
  namespace: checkmk
spec:
  interval: 10m0s
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: checkmk-helmrepository
        namespace: flux-system
  values:
    controllers:
      checkmk:
        containers:
          app:
            image:
              repository: checkmk/check-mk-community
              tag: 2.5.0
            envFrom:
              - secretRef:
                  name: checkmk-secret
    service:
      app:
        controller: checkmk
        ports:
          http:
            port: 5000
          agent:
            port: 8000
    persistence:
      storage:
        existingClaim: checkmk-pvc
        globalMounts:
          - path: /omd/sites
