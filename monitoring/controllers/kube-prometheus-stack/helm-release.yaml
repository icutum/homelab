---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack-helmrelease
  namespace: kube-prometheus-stack
spec:
  interval: 10m0s
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 85.2.0
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack-helmrepository
        namespace: flux-system
  values:
    kubeControllerManager:
      jobNameOverride: "k3s-server"
    kubeProxy:
      jobNameOverride: "k3s-server"
    kubeScheduler:
      jobNameOverride: "k3s-server"
    grafana:
      admin:
        existingSecret: kube-prometheus-stack-secret-grafana
    prometheus:
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              resources:
                requests:
                  storage: 1Gi
