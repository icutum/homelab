---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-scale-set-helmrelease
  namespace: actions-runner-scale-set
spec:
  interval: 10m0s
  chartRef:
    kind: OCIRepository
    name: actions-runner-scale-set-ocirepository
  values:
    runnerScaleSetName: arc-runner-set
    githubConfigUrl: https://github.com/icutum/infra
    githubConfigSecret: actions-runner-scale-set-github-token
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:sha256-8c3f5970b8ceb90cbd3e89b80c6806bb74d9c31686e9177c743323a4539d12f5
            command: ["/home/runner/run.sh"]
