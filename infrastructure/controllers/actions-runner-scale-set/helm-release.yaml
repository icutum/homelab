---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-scale-set-helmrelease
  namespace: actions-runner-scale-set
spec:
  interval: 10m0s
  chartRef:
    kind: OCIRepository
    name: actions-runner-scale-set-ocirepository
  values:
    runnerScaleSetName: arc-runner-set
    githubConfigUrl: https://github.com/icutum/infra
    githubConfigSecret: actions-runner-scale-set-github-token
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:sha256:bdd470624ce28f5c3aa44e3fa0b7776c6885dd8d5b0ff9d98218ae42fee993a0
            command: ["/home/runner/run.sh"]
