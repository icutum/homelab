---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik-helmrelease
  namespace: authentik
spec:
  interval: 10m0s
  chart:
    spec:
      chart: authentik
      version: 2026.2.3
      sourceRef:
        kind: HelmRepository
        name: authentik-helmrepository
        namespace: flux-system
  values:
    authentik:
      postgresql:
        host: authentik-cluster-rw.authentik.svc.cluster.local
        name: authentik
        user: authentik
    server:
      replicas: 2
    worker:
      replicas: 2
