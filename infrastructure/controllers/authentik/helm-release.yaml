---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik-helmrelease
  namespace: authentik
spec:
  interval: 10m0s
  chart:
    spec:
      chart: authentik
      version: 2026.2.3
      sourceRef:
        kind: HelmRepository
        name: authentik-helmrepository
        namespace: flux-system
  values:
    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-db-secret
              key: password
      envFrom:
        - secretRef:
            name: authentik-secret
    authentik:
      postgresql:
        host: authentik-cluster-rw.authentik.svc.cluster.local
    server:
      replicas: 2
    worker:
      replicas: 2
