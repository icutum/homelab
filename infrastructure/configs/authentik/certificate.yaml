  name: authentik-certificate
  namespace: authentik
spec:
  secretName: authentik-local-icutum-es-tls
  issuerRef:
    name: cert-manager-cluster-issuer
    kind: ClusterIssuer
  commonName: "authentik.local.icutum.es"
  dnsNames:
    - "authentik.local.icutum.es"
